<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dicio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo" onclick="goHome()">Dicio</div>

  <button class="nav-button" onclick="toggleMenu(event)">
    <img class="account-icon" id="userPhoto">
    <span class="account-name" id="userName"></span>

    <svg class="chevron-icon" viewBox="0 0 24 24">
      <path d="m6 9 6 6 6-6" fill="none" stroke="currentColor"/>
    </svg>

    <div class="dropdown" id="dropdown">
      <div class="item black" onclick="goProfile()">
        <span id="icon-user"></span>
        Profil
      </div>

      <div class="item red" onclick="logout()">
        <span id="icon-logout"></span>
        Déconnexion
      </div>
    </div>
  </button>
</header>

<main>
  <h1 id="welcome"></h1>
</main>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="icons.js"></script>
<script src="app.js"></script>

</body>
</html>

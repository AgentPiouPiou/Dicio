<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profil</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<button onclick="goHome()">🏠 Menu</button>
<button onclick="goSettings()">Modifier profil</button>

<img id="photo" width="100" style="border-radius:50%">

<h2 id="name"></h2>
<p id="id"></p>

<!-- SETTINGS -->
<div id="settings" style="display:none;">

  <h3>Modifier profil</h3>

  <input id="newName" placeholder="Pseudo">
  <input id="newId" placeholder="ID">

  <input type="file" id="fileInput" accept="image/*" style="display:none">

  <button onclick="choosePhoto()">Changer photo (fichier)</button>
  <button onclick="openCamera()">Caméra</button>

  <video id="camera" style="display:none; width:100%"></video>

  <button onclick="updateProfile()">Enregistrer</button>

  <p id="error" style="color:red;"></p>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>

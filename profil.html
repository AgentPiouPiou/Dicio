<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profil</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Profil</h1>

<img id="photo" width="100" style="border-radius:50%">

<h2 id="name"></h2>
<p id="id"></p>

<button onclick="goSettings()">Modifier</button>

<div id="settings" style="display:none;">
  <h2>Settings</h2>

  <input id="newName" placeholder="Pseudo">
  <input id="newId" placeholder="ID">

  <input id="newPhoto" placeholder="URL photo">

  <button onclick="updateProfile()">Enregistrer</button>

  <p id="error" style="color:red;"></p>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Profil</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <div class="logo" onclick="goHome()">Dicio</div>

  <button class="nav-button" onclick="toggleMenu(event)">
    <img id="userPhoto" class="account-icon">
    <span id="userName"></span>

    <svg class="chevron-icon" viewBox="0 0 24 24">
      <path d="M6 9l6 6 6-6" fill="none" stroke="currentColor"/>
    </svg>

    <div class="dropdown" id="dropdown">
      <div class="item black" onclick="goProfile()">
        <span id="icon-user"></span>
        <span>Profil</span>
      </div>

      <div class="item red" onclick="logout()">
        <span id="icon-logout"></span>
        <span>Déconnexion</span>
      </div>
    </div>
  </button>
</header>

<div class="profile-page">

  <h1>Profil</h1>

  <div class="profile-card">

    <div class="profile-image-container">

      <img id="profilePic">

      <!-- STATUS -->
      <div id="statusDot" class="status-dot"></div>

      <!-- EDIT BTN SUR PP -->
      <div id="editBtn" class="edit-avatar-btn" style="display:none;">
        <svg viewBox="0 0 24 24">
          <path d="M3 17.25V21h3.75L17.8 9.94l-3.75-3.75L3 17.25z"/>
        </svg>
      </div>

    </div>

    <div class="profile-info">
      <h2 id="profileName"></h2>
      <p id="profileId"></p>
    </div>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/profile.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="css/style.css">
  <title>Profil</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="logo" onclick="goHome()">Dicio</div>

  <button class="nav-button" onclick="toggleMenu(event)">
    <img id="userPhoto" class="account-icon">
    <span id="userName"></span>

    <div class="dropdown" id="dropdown">
      <div class="item" onclick="goProfile()">
        <span id="icon-user"></span> Profil
      </div>
      <div class="item red" onclick="logout()">
        <span id="icon-logout"></span> Déconnexion
      </div>
    </div>
  </button>
</header>

<div class="profile-page">

  <h1>Profil</h1>

  <div style="position:relative;">

    <div id="editBtn" class="edit-btn" style="display:none;">
      <span id="icon-edit"></span> Modifier
    </div>

  </div>

  <div class="profile-card">

    <div class="profile-image-container">
      <img id="profilePic">
    </div>

    <div>
      <h2 id="profileName"></h2>
      <p id="profileId"></p>
    </div>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/profile.js"></script>

</body>
</html>

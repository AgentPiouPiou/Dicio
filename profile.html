<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Profil</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <div class="logo" onclick="goHome()">Dicio</div>

  <button class="nav-button" onclick="toggleMenu(event)">
    <img id="userPhoto" class="account-icon">
    <span id="userName"></span>

    <svg class="chevron-icon" viewBox="0 0 24 24">
      <path d="M6 9l6 6 6-6" stroke="currentColor" fill="none"/>
    </svg>

    <div class="dropdown" id="dropdown">

      <div class="item black" onclick="goProfile()">
        <svg class="icon-svg" viewBox="0 0 24 24">
          <path d="M12 12a5 5 0 100-10 5 5 0 000 10zM4 22a8 8 0 0116 0"/>
        </svg>
        <span>Profil</span>
      </div>

      <div class="item red" onclick="logout()">
        <svg class="icon-svg" viewBox="0 0 24 24">
          <path d="M16 17l5-5-5-5M21 12H9"/>
        </svg>
        <span>Déconnexion</span>
      </div>

    </div>
  </button>
</header>

<div class="profile-page">

  <div class="profile-header">

    <div class="profile-image-container">
      <img id="profilePic">
    </div>

    <div class="profile-info">
      <h2 id="profileName"></h2>
      <p id="profileId"></p>
    </div>

    <!-- bouton edit -->
    <div id="editBtn" class="edit-floating-btn" style="display:none;">
      <svg viewBox="0 0 24 24">
        <path d="M3 17.25V21h3.75L17.8 9.94l-3.75-3.75L3 17.25z"/>
      </svg>
    </div>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/profile.js"></script>

</body>
</html>

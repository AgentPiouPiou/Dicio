<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Modifier profil</title>

  <link rel="stylesheet" href="/css/app.css">
</head>

<body>

<header>
  <div class="logo" onclick="goHome()">Dicio</div>

  <button class="nav-button">
    <img id="userPhoto" class="account-icon">
    <span id="userName"></span>
  </button>
</header>

<div class="edit-container">

  <h1>Modifier le profil</h1>

  <div class="edit-card">

    <!-- PHOTO -->
    <div class="profile-image-container edit">

      <img id="editPic">

      <div class="avatar-edit-btn" onclick="document.getElementById('fileInput').click()">
        <svg viewBox="0 0 24 24">
          <path d="M3 17.25V21h3.75L17.8 9.94l-3.75-3.75L3 17.25z"/>
        </svg>
      </div>

      <input type="file" id="fileInput" hidden>

    </div>

    <!-- PSEUDO -->
    <div class="input-group">
      <label>Pseudo</label>
      <input id="usernameInput" class="input" maxlength="20">
    </div>

    <!-- ID -->
    <div class="input-group">
      <label>ID</label>
      <input id="idInput" class="input" maxlength="20">
    </div>

    <!-- SAVE -->
    <button onclick="saveProfile()" class="save-btn">
      Sauvegarder
    </button>

  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

<!-- App -->
<script type="module" src="/js/app.js"></script>

</body>
</html>

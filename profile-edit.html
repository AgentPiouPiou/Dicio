<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <title>Modification de Profil</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <div class="logo" onclick="goHome()">Dicio</div>

  <button class="nav-button" onclick="toggleMenu(event)">
    <img id="userPhoto" class="account-icon">
    <span id="userName"></span>

    <svg class="chevron-icon" viewBox="0 0 24 24">
      <path d="M6 9l6 6 6-6" fill="none" stroke="currentColor"/>
    </svg>

    <div class="dropdown" id="dropdown">

      <div class="item black" onclick="goProfile()">
        <span id="icon-user"></span>
        <span>Profil</span>
      </div>

      <div class="item red" onclick="logout()">
        <span id="icon-logout"></span>
        <span>Déconnexion</span>
      </div>

    </div>
  </button>
</header>

<main>
<div class="edit-container">

  <h1>Modifier le profil</h1>

  <div class="edit-card">

    <!-- PHOTO -->
    <img id="editPic" class="edit-avatar-big">

    <!-- INPUT -->
    <div class="input-group">
      <label>Pseudo</label>

      <input 
        id="usernameInput" 
        class="input" 
        maxlength="12"
      >

      <div class="input-info">
        <span id="charCount">0/12</span>
      </div>
    </div>

    <!-- BOUTON -->
    <button id="saveBtn" class="save-btn" disabled>
      Sauvegarder
    </button>

    <div id="successMsg" class="success-msg">
      Modifications enregistrées ✔
    </div>

  </div>

</div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/icons.js"></script>
<script src="js/app.js"></script>

</body>
</html>

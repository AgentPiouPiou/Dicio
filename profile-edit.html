<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Modifier profil</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo" onclick="goHome()">Dicio</div>

  <button class="nav-button">
    <img id="userPhoto" class="account-icon">
    <span id="userName"></span>
  </button>
</header>

<!-- PAGE -->
<div class="edit-container">

  <h1>Modifier le profil</h1>

  <div class="edit-card">

    <!-- PHOTO -->
    <div class="profile-image-container">
      <img id="editPic">

      <div class="edit-avatar" onclick="document.getElementById('fileInput').click()">
        📸
      </div>
    </div>

    <input type="file" id="fileInput" hidden>

    <!-- PSEUDO -->
    <input id="usernameInput" class="input" maxlength="20">

    <!-- ID -->
    <input id="idInput" class="input" maxlength="20">

    <!-- SAVE -->
    <button id="saveBtn" class="save-btn">
      Sauvegarder
    </button>

    <div id="successMsg" class="success-msg">
      Sauvegardé ✔
    </div>

  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/profile-edit.js"></script>

</body>
</html>
